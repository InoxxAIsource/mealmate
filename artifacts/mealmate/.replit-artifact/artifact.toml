kind = "web"
previewPath = "/app/"
title = "MealMate"
version = "1.0.0"
id = "artifacts/mealmate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/app/" ]
localPort = 22843

[services.development]
run = "pnpm --filter @workspace/mealmate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mealmate", "run", "build" ]
publicDir = "artifacts/mealmate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22843"
BASE_PATH = "/app/"
